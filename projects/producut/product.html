<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Frock</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>

    <div class="container">
        <div class="product">

            <div class="gallery">
                <img src="https://imgs.search.brave.com/bxftd6YlHR4xje6BH4A5DYQmogxRjunZBdc17d_WJ0Q/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9zdGFu/d2VsbHNraWRzLmlu/L2Nkbi9zaG9wL2Zp/bGVzL1Bhc3RlbExh/dmVuZGVyQW5nZWxU/aGVtZUZyb2NrX1By/ZW1pdW1Tb2Z0U2ls/a1BhcnR5d2VhcmZv/ckdpcmxzX1N0YW53/ZWxsc2tpZHNfMi5q/cGc_dj0xNzY5NzYx/MzA1JndpZHRoPTEw/MDA"
                     alt="Stylish Frock">
            </div>

            <div class="details">
                <h1>Stylish Frock</h1>

                <div class="price-box">
                    <h2>$15.00</h2>
                    <h3>30% OFF</h3>
                </div>

                <p>
                    This frock combines comfort, style, and sophistication,
                    making it suitable for various occasions.
                </p>

                <form>
                    <div class="size-select">
                        <p>Select Size</p>

                        <label>
                            <input type="radio" name="size" checked>
                            <span>S</span>
                        </label>

                        <label>
                            <input type="radio" name="size">
                            <span>M</span>
                        </label>

                        <label>
                            <input type="radio" name="size">
                            <span>L</span>
                        </label>

                        <label>
                            <input type="radio" name="size">
                            <span>XL</span>
                        </label>
                    </div>

                    <div class="buttons">
                        <button type="button" class="cart-btn">
                            Add to Cart
                        </button>

                        <button type="submit" class="buy-btn">
                            Buy Now
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
